<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VP Trainer">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#010608">
<title>Jacks or Better &#8212; Video Poker Trainer</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:#010608}
body{-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
*{user-select:none;-webkit-user-select:none}
input,textarea{user-select:text;-webkit-user-select:text}
#root{display:block;width:100%}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#010608;flex-direction:column;gap:12px}
#loading .s{font-size:28px;color:#9a7d2a;letter-spacing:6px}
#loading .l{font-size:11px;color:#4a3a10;letter-spacing:3px;font-family:Arial,sans-serif}
#ep{display:none;position:fixed;inset:0;background:#050005;padding:20px;overflow:auto;font-family:monospace;font-size:12px;color:#ff6060;z-index:99999}
#ep h2{color:#f4c430;margin-bottom:10px}#ep pre{white-space:pre-wrap;word-break:break-all}
@keyframes payPop{0%{transform:scale(.06);opacity:0}65%{opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes payPopOut{0%{transform:scale(1);opacity:1}100%{transform:scale(.06);opacity:0}}
@keyframes haloPulse{0%,100%{box-shadow:0 0 14px 4px rgba(244,196,48,0.7)}50%{box-shadow:0 0 28px 10px rgba(244,196,48,0.95)}}
input.tsl{-webkit-appearance:none;appearance:none;height:30px;background:transparent;touch-action:manipulation}
input.tsl::-webkit-slider-runnable-track{height:8px;border-radius:4px;background:linear-gradient(90deg,#3a2e12,#9a7d2a)}
input.tsl::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;margin-top:-9px;border-radius:50%;background:#f4c430;border:2px solid #6b5410;box-shadow:0 0 6px rgba(244,196,48,.6)}
input.tsl::-moz-range-track{height:8px;border-radius:4px;background:#6b5410}
input.tsl::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#f4c430;border:2px solid #6b5410}
html,body{touch-action:manipulation}
button{touch-action:manipulation}
@keyframes wldp{0%,100%{box-shadow:0 0 8px 2px rgba(244,196,48,.45)}50%{box-shadow:0 0 18px 6px rgba(244,196,48,.95)}}
</style>
</head>
<body>
<div id="loading"><div class="s">&#9824; &#9829; &#9830; &#9827;</div><div class="l">LOADING&#8230;</div></div>
<div id="root" style="display:none"></div>
<div id="ep"><h2>&#9888; Error</h2><pre id="et"></pre></div>
<script>
window.onerror=function(m,s,l,c,e){
  document.getElementById("loading").style.display="none";
  var p=document.getElementById("ep");
  document.getElementById("et").textContent="Message: "+m+"\nLine: "+l+":"+c+(e&&e.stack?"\n\nStack:\n"+e.stack:"");
  p.style.display="block";p.onclick=function(){p.style.display="none";};
};
window.addEventListener("unhandledrejection",function(e){
  window.onerror("Rejection: "+(e.reason&&e.reason.message||e.reason),"",0,0,e.reason);
});
window.storage=window.storage||{
  get:async function(k){try{var v=localStorage.getItem(k);return v?{key:k,value:v}:null;}catch(e){return null;}},
  set:async function(k,v){try{localStorage.setItem(k,String(v));return{key:k,value:v};}catch(e){return null;}},
  delete:async function(k){try{localStorage.removeItem(k);return{key:k,deleted:true};}catch(e){return null;}},
  list:async function(p){try{return{keys:Object.keys(localStorage).filter(function(k){return !p||k.indexOf(p)===0;})};}catch(e){return{keys:[]};}}
};

</script>
